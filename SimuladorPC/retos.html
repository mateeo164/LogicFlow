<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Retos de diagnóstico y reparación de PC en el taller 3D de LogicFlow.">
    <meta name="theme-color" content="#4f46e5">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <title>Retos de Reparación — LogicFlow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/estilos.css">
    <link rel="stylesheet" href="css/logicflow-premium.css">
    <link rel="stylesheet" href="css/dashboard-v2.css">
    <link rel="stylesheet" href="css/retos.css">
    <script>
        (function() {
            var token = localStorage.getItem('logicflow_access_token');
            var refresh = localStorage.getItem('logicflow_refresh_token');
            if (!token && !refresh) { window.location.replace('login.html'); return; }
            try {
                var u = JSON.parse(localStorage.getItem('logicflow_user') || 'null');
                if (u && u.user_metadata && u.user_metadata.rol === 'Tutor') {
                    window.location.replace('menu.html');
                }
            } catch (e) {}
        })();
</script>
</head>
<body class="dashboard-body">

    <header class="lf-header dashboard-header">
        <a href="index.html" class="logo-area" style="text-decoration:none;">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#566ab3" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="2"/><rect x="9" y="9" width="6" height="6"/><line x1="9" y1="1" x2="9" y2="4"/><line x1="15" y1="1" x2="15" y2="4"/><line x1="9" y1="20" x2="9" y2="23"/><line x1="15" y1="20" x2="15" y2="23"/><line x1="20" y1="9" x2="23" y2="9"/><line x1="20" y1="14" x2="23" y2="14"/><line x1="1" y1="9" x2="4" y2="9"/><line x1="1" y1="14" x2="4" y2="14"/></svg>
            <span class="logo-text">LogicFlow</span>
        </a>
        <div class="dashboard-header-actions">
            <a href="menu.html" class="btn btn-secondary btn-sm">← Mi panel</a>
            <button type="button" class="lf-theme-toggle" id="theme-toggle" aria-label="Cambiar tema" title="Cambiar tema">
                <svg class="lf-theme-icon--moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                <svg class="lf-theme-icon--sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
            </button>
        </div>
    </header>

    <main class="retos-main">

        <section class="retos-hero">
            <span class="lab-eyebrow">Taller de reparación · Modo Retos</span>
            <h1>🔧 Retos de diagnóstico</h1>
            <p>Encuentra la falla, repárala en 3D y gana tu nota sobre 10.</p>
            <div class="retos-resumen" id="retos-resumen">
                <div class="retos-resumen__item"><strong id="rr-superados">—</strong><span>Retos superados</span></div>
                <div class="retos-resumen__item"><strong id="rr-mejor">—</strong><span>Mejor nota</span></div>
                <div class="retos-resumen__item"><strong id="rr-logros">—</strong><span>Logros del taller</span></div>
            </div>
        </section>

        <section>
            <h2 class="retos-seccion-titulo">Casos disponibles</h2>
            <div class="retos-grid" id="retos-grid">
                <p class="retos-cargando">Cargando retos…</p>
            </div>
        </section>

        <section>
            <h2 class="retos-seccion-titulo">🏅 Logros del taller</h2>
            <div class="logros-grid" id="logros-grid"></div>
        </section>

    </main>

    <script src="js/theme.js"></script>
    <script type="module" src="js/retos-page.js"></script>
</body>
</html>
