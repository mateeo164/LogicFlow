<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>try{if(localStorage.getItem('logicflow-theme')==='dark')document.documentElement.setAttribute('data-theme','dark');}catch(e){}</script>
    <meta name="description" content="Crea tu cuenta en LogicFlow y empieza a aprender ensamblaje de PCs.">
    <meta name="theme-color" content="#4f46e5">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <title>Crear Cuenta - LogicFlow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/estilos.css">
    <link rel="stylesheet" href="css/logicflow-premium.css">
    <link rel="stylesheet" href="css/auth-v2.css">
</head>
<body class="auth-body">

    <div class="auth-panel">
        <main class="auth-container" style="max-width: 520px;">

            <button type="button" class="lf-theme-toggle" id="theme-toggle" aria-label="Cambiar tema" title="Cambiar tema">
                <svg class="lf-theme-icon--moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                <svg class="lf-theme-icon--sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
            </button>

            <div class="auth-logo-wrapper">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="auth-icon-center"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="4"></circle><line x1="20" y1="8" x2="20" y2="14"></line><line x1="23" y1="11" x2="17" y2="11"></line></svg>
            </div>

            <h1 class="auth-title">Crea tu cuenta</h1>
            <p class="auth-subtitulo">Elige tu rol y empieza en minutos.</p>

            <div id="auth-mensaje" class="auth-message" hidden></div>

            <form class="auth-form" id="form-registro" novalidate>

                <div class="selector-rol">
                    <div>
                        <input type="radio" id="rol-estudiante" name="rol" value="Estudiante" checked>
                        <label for="rol-estudiante">
                            <h3>🎓 Estudiante</h3>
                            <p>Aprende y practica en el laboratorio 3D.</p>
                        </label>
                    </div>
                    <div>
                        <input type="radio" id="rol-tutor" name="rol" value="Tutor">
                        <label for="rol-tutor">
                            <h3>👨‍🏫 Tutor</h3>
                            <p>Crea clases y sigue el progreso.</p>
                        </label>
                    </div>
                </div>

                <div class="input-group">
                    <input type="text" id="nombres" name="nombres" required placeholder=" ">
                    <label for="nombres">Nombre completo</label>
                </div>

                <div class="input-group">
                    <input type="email" id="correo" name="correo" required placeholder=" ">
                    <label for="correo">Correo electrónico</label>
                </div>

                <div class="input-group">
                    <input type="text" id="institucion" name="institucion" placeholder=" ">
                    <label for="institucion">Cursos o Institución (Opcional)</label>
                </div>

                <div style="display: flex; gap: 15px;">
                    <div class="input-group" style="flex: 1;">
                        <input type="password" id="password" name="password" required placeholder=" ">
                        <label for="password">Contraseña</label>
                    </div>
                    <div class="input-group" style="flex: 1;">
                        <input type="password" id="confirm_password" name="confirm_password" required placeholder=" ">
                        <label for="confirm_password">Confirmar</label>
                    </div>
                </div>

                <div class="password-strength" aria-hidden="true">
                    <div class="password-strength__bar" id="password-strength-bar"></div>
                </div>

                <div class="auth-links" style="margin-top: 5px;">
                    <a href="login.html">¿Ya tienes una cuenta? Inicia sesión.</a>
                </div>

                <div class="auth-actions">
                    <button type="submit" class="btn btn-primary auth-btn">Crear cuenta</button>
                </div>
                <div class="auth-btn-secondary-wrapper" style="margin-top: 15px;">
                    <button type="button" class="btn btn-secondary auth-btn auth-btn-outline" onclick="window.location.href='index.html'">Volver al inicio</button>
                </div>

            </form>
        </main>
    </div>

    <div class="auth-hero-panel" aria-hidden="true">
        <div class="auth-hero-content">
            <div class="auth-hero-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            </div>
            <h2 class="auth-hero-title">Únete a LogicFlow</h2>
            <p class="auth-hero-desc">Simulación guiada, evaluación y certificación en un solo lugar.</p>
            <div class="auth-features">
                <div class="auth-feature">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                    <span>Retos progresivos de dificultad</span>
                </div>
                <div class="auth-feature">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                    <span>Feedback inmediato y métricas</span>
                </div>
                <div class="auth-feature">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                    <span>Perfil de tutor para docentes</span>
                </div>
            </div>
        </div>
    </div>

    <script src="js/theme.js"></script>
    <script src="js/ui-effects.js"></script>
    <script type="module" src="js/registro.js"></script>
    <script src="js/sw-register.js"></script>
</body>
</html>
