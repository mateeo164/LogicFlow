<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Inicia sesión en LogicFlow y continúa tu aprendizaje de ensamblaje de PCs.">
    <meta name="theme-color" content="#4f46e5">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <title>Iniciar Sesión - LogicFlow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/estilos.css">
    <link rel="stylesheet" href="css/logicflow-premium.css">
    <link rel="stylesheet" href="css/auth-v2.css">
</head>
<body class="auth-body">

    <div class="auth-panel">
        <main class="auth-container">

            <button type="button" class="lf-theme-toggle" id="theme-toggle" aria-label="Cambiar tema" title="Cambiar tema">
                <svg class="lf-theme-icon--moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                <svg class="lf-theme-icon--sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
            </button>

            <div class="auth-logo-wrapper">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" class="auth-icon-center"><rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect><rect x="9" y="9" width="6" height="6"></rect><line x1="9" y1="1" x2="9" y2="4"></line><line x1="15" y1="1" x2="15" y2="4"></line><line x1="9" y1="20" x2="9" y2="23"></line><line x1="15" y1="20" x2="15" y2="23"></line><line x1="20" y1="9" x2="23" y2="9"></line><line x1="20" y1="14" x2="23" y2="14"></line><line x1="1" y1="9" x2="4" y2="9"></line><line x1="1" y1="14" x2="4" y2="14"></line></svg>
            </div>

            <h1 class="auth-title">Bienvenido de vuelta</h1>
            <p class="auth-subtitulo">Continúa tu aprendizaje justo donde lo dejaste.</p>

            <div id="auth-mensaje" class="auth-message" hidden></div>

            <form class="auth-form" id="form-login" novalidate>

                <div class="input-group">
                    <input type="email" id="correo" name="correo" required placeholder=" " autocomplete="email">
                    <label for="correo">Correo electrónico</label>
                </div>

                <div class="input-group">
                    <input type="password" id="password" name="password" required placeholder=" " autocomplete="current-password">
                    <label for="password">Contraseña</label>
                </div>

                <div class="auth-links">
                    <a href="registro.html">Crear tu cuenta</a>
                    <span class="auth-links-sep">·</span>
                    <a href="recuperar-password.html">¿Olvidaste tu contraseña?</a>
                </div>

                <div class="auth-actions">
                    <button type="submit" class="btn btn-primary auth-btn">Continuar</button>
                    <div class="auth-btn-secondary-wrapper">
                        <button type="button" class="btn btn-secondary auth-btn auth-btn-outline" onclick="window.location.href='index.html'">Volver al inicio</button>
                    </div>
                </div>

            </form>
        </main>
    </div>

    <div class="auth-hero-panel" aria-hidden="true">
        <div class="auth-hero-content">
            <div class="auth-hero-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="2"/><rect x="9" y="9" width="6" height="6"/><line x1="9" y1="1" x2="9" y2="4"/><line x1="15" y1="1" x2="15" y2="4"/><line x1="9" y1="20" x2="9" y2="23"/><line x1="15" y1="20" x2="15" y2="23"/><line x1="20" y1="9" x2="23" y2="9"/><line x1="20" y1="14" x2="23" y2="14"/><line x1="1" y1="9" x2="4" y2="9"/><line x1="1" y1="14" x2="4" y2="14"/></svg>
            </div>
            <h2 class="auth-hero-title">Domina el ensamblaje de PC</h2>
            <p class="auth-hero-desc">Practica en un laboratorio 3D y avanza hacia tu certificación técnica.</p>
            <div class="auth-features">
                <div class="auth-feature">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                    <span>Laboratorio 3D interactivo</span>
                </div>
                <div class="auth-feature">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                    <span>Progreso y logros visibles</span>
                </div>
                <div class="auth-feature">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                    <span>Certificado de completitud</span>
                </div>
            </div>
        </div>
    </div>

    <script src="js/theme.js"></script>
    <script src="js/ui-effects.js"></script>
    <script type="module" src="js/login.js"></script>
    <script src="js/sw-register.js"></script>
</body>
</html>
